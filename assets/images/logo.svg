<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Le Marin Hôtel</title>
  <desc id="logoDesc">Hotel and marine-inspired logo for Le Marin Hôtel</desc>
  <defs>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e5a96;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d3b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Waves background -->
  <path d="M0 75 Q15 70 30 75 T60 75 T90 75 T120 75 L120 120 L0 120" fill="url(#oceanGrad)"/>
  <path d="M0 80 Q15 75 30 80 T60 80 T90 80 T120 80 L120 120 L0 120" fill="#0d3b6b" opacity="0.6"/>
  
  <!-- Building/Hotel structure -->
  <rect x="35" y="25" width="50" height="45" fill="none" stroke="#c9a84c" stroke-width="2.5" rx="3"/>
  
  <!-- Windows (rooms) -->
  <circle cx="43" cy="35" r="3" fill="#c9a84c" opacity="0.9"/>
  <circle cx="53" cy="35" r="3" fill="#c9a84c" opacity="0.9"/>
  <circle cx="63" cy="35" r="3" fill="#c9a84c" opacity="0.9"/>
  <circle cx="73" cy="35" r="3" fill="#c9a84c" opacity="0.9"/>
  
  <circle cx="43" cy="48" r="3" fill="#c9a84c" opacity="0.75"/>
  <circle cx="53" cy="48" r="3" fill="#c9a84c" opacity="0.75"/>
  <circle cx="63" cy="48" r="3" fill="#c9a84c" opacity="0.75"/>
  <circle cx="73" cy="48" r="3" fill="#c9a84c" opacity="0.75"/>
  
  <circle cx="43" cy="61" r="3" fill="#c9a84c" opacity="0.6"/>
  <circle cx="53" cy="61" r="3" fill="#c9a84c" opacity="0.6"/>
  <circle cx="63" cy="61" r="3" fill="#c9a84c" opacity="0.6"/>
  <circle cx="73" cy="61" r="3" fill="#c9a84c" opacity="0.6"/>
  
  <!-- Roof accent -->
  <polygon points="35,25 60,10 85,25" fill="none" stroke="#c9a84c" stroke-width="2.5"/>
  
  <!-- Nautical flag on top -->
  <rect x="58" y="5" width="4" height="8" fill="#c9a84c"/>
  <polygon points="62,5 62,12 70,8.5" fill="#c9a84c"/>
</svg>
